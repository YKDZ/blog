name: Deploy Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: vercel-production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Prepare Vercel output
        run: pnpm vercel:output

      - name: Link Vercel project
        run: |
          mkdir -p .vercel-deploy/.vercel
          printf '{"orgId":"%s","projectId":"%s"}\n' \
            "$VERCEL_ORG_ID" \
            "$VERCEL_PROJECT_ID" > .vercel-deploy/.vercel/project.json
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        id: deploy
        working-directory: .vercel-deploy
        run: |
          set -o pipefail
          pnpm dlx vercel@latest deploy --prebuilt --prod --token "$VERCEL_TOKEN" | tee deploy.log
          url="$(grep -Eo 'https://[^ ]+\.vercel\.app' deploy.log | tail -n 1)"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "$url"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
